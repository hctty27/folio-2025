name: Apply verified real SU7 vehicle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-real-su7.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Reconstruct and validate SU7 model
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .su7-upload -maxdepth 1 -type f -name 'part-*' | wc -l)" -eq 9
          find .su7-upload -maxdepth 1 -type f -name 'part-*' -print0 \
            | sort -z \
            | xargs -0 cat \
            | tr -d '\r\n ' \
            | base64 --decode > /tmp/su7.glb.gz
          gzip -dc /tmp/su7.glb.gz > /tmp/su7.glb
          echo "444b923820765d7ca88023ef72edabf59977d7128016e0c6ebae53d30593824d  /tmp/su7.glb" | sha256sum -c -

          node <<'NODE'
          const fs = require('fs')
          const buffer = fs.readFileSync('/tmp/su7.glb')
          if(buffer.toString('ascii', 0, 4) !== 'glTF') throw new Error('Invalid GLB magic')
          const jsonLength = buffer.readUInt32LE(12)
          const jsonType = buffer.readUInt32LE(16)
          if(jsonType !== 0x4E4F534A) throw new Error('Missing GLB JSON chunk')
          const json = JSON.parse(buffer.subarray(20, 20 + jsonLength).toString('utf8').replace(/\0+$/g, '').trim())
          const names = new Set((json.nodes || []).map((node) => node.name))
          const required = ['chassis', 'bodyPainted', 'wheelContainer', 'wheelSuspension', 'wheelCylinder', 'wheelPainted']
          const missing = required.filter((name) => !names.has(name))
          if(missing.length) throw new Error(`Missing vehicle nodes: ${missing.join(', ')}`)
          console.log(`Validated SU7 GLB: ${buffer.length} bytes, ${json.nodes.length} nodes, ${json.meshes.length} meshes`)
          NODE

      - name: Install vehicle and calibrate physics
        shell: bash
        run: |
          set -euo pipefail
          install -m 0644 /tmp/su7.glb static/vehicle/default.glb
          install -m 0644 /tmp/su7.glb static/vehicle/default-compressed.glb

          cat > static/vehicle/SU7_MODEL_CREDITS.md <<'EOF'
          # Xiaomi SU7 model credit

          This work is based on **“Xiaomi SU7”** by **GT Cars: Hyperspeed (@Car2022)**.

          - Source: https://sketchfab.com/3d-models/xiaomi-su7-ca2cda599f5341068c992c9f44551bf9
          - Author: https://sketchfab.com/Car2022
          - License: CC BY 4.0 — https://creativecommons.org/licenses/by/4.0/
          - Changes: transformed for the folio-2025 coordinate system, separated the wheel rig, removed duplicate fixed wheels, renamed gameplay nodes, optimized for web delivery, and changed the default paint to elegant grey.
          EOF

          python3 <<'PY'
          from pathlib import Path

          physics = Path('sources/Game/Physics/PhysicsVehicle.js')
          text = physics.read_text()
          replacements = {
              "parameters: [ 1.3, 0.4, 0.85 ]": "parameters: [ 2.15, 0.4, 0.9 ]",
              "parameters: [ 0.5, 0.15, 0.65 ]": "parameters: [ 1.05, 0.15, 0.72 ]",
              "parameters: [ 1.5, 0.5, 0.9 ]": "parameters: [ 2.2, 0.5, 0.98 ]",
              "offset: { x: 0.90, y: 0, z: 0.75 }": "offset: { x: 1.317, y: 0, z: 0.755 }",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected PhysicsVehicle source not found: {old}')
              text = text.replace(old, new, 1)
          physics.write_text(text)

          visual = Path('sources/Game/World/VisualVehicle.js')
          text = visual.read_text()
          replacements = {
              "position.set(-1.28, 0.1, -0.55)": "position.set(-2.05, 0.1, -0.62)",
              "position.set(-1.28, 0.1, 0.55)": "position.set(-2.05, 0.1, 0.62)",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected VisualVehicle source not found: {old}')
              text = text.replace(old, new, 1)
          visual.write_text(text)
          PY

      - name: Remove temporary upload files
        shell: bash
        run: |
          rm -rf .su7-upload
          rm -f .github/workflows/apply-real-su7.yml

      - name: Commit real SU7 integration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "feat: install verified real Xiaomi SU7 vehicle"
          git push origin HEAD:main
