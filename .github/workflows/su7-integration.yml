name: SU7 Integration

on:
  push:
    branches:
      - feat/xiaomi-su7-vehicle
      - feat/su7-full-vehicle-rig
      - feat/su7-recognizable-lowpoly
    paths:
      - .github/workflows/su7-integration.yml
      - scripts/vehicle/**
      - sources/**
      - tests/vehicle/**
      - static/vehicle/su7*.glb
      - package.json
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/su7-integration.yml
      - scripts/vehicle/**
      - sources/**
      - tests/vehicle/**
      - static/vehicle/su7*.glb
      - package.json

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || '' }}
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump SU7 asset cache version
        if: github.event_name == 'push' && github.ref_name == 'feat/su7-recognizable-lowpoly'
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises'
          const path = 'sources/Game/Game.js'
          const source = await readFile(path, 'utf8')
          const next = source.replace('vehicle/su7${compressedModelSuffix}.glb?cb=2', 'vehicle/su7${compressedModelSuffix}.glb?cb=3')
          if(next === source && !source.includes('vehicle/su7${compressedModelSuffix}.glb?cb=3'))
              throw new Error('SU7 resource URL not found')
          await writeFile(path, next)
          NODE

      - name: Regenerate SU7 assets
        run: npm run vehicle:generate

      - name: Inspect SU7 assets
        run: npm run vehicle:inspect

      - name: Verify generated assets are committed
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- static/vehicle/su7.glb static/vehicle/su7-compressed.glb

      - name: Run vehicle tests
        run: npm run test:vehicle

      - name: Build production bundle
        run: npm run build

      - name: Commit verified recognizable SU7 assets
        if: github.event_name == 'push' && github.ref_name == 'feat/su7-recognizable-lowpoly'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sources/Game/Game.js static/vehicle/su7.glb static/vehicle/su7-compressed.glb
          git diff --cached --quiet && exit 0
          git commit -m "feat: commit recognizable SU7 model assets"
          git push origin HEAD:feat/su7-recognizable-lowpoly
