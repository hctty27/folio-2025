name: SU7 Integration

on:
  push:
    branches:
      - feat/xiaomi-su7-vehicle
      - feat/su7-full-vehicle-rig
    paths:
      - .github/workflows/su7-integration.yml
      - scripts/vehicle/**
      - sources/**
      - tests/vehicle/**
      - static/vehicle/su7*.glb
      - package.json
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/su7-integration.yml
      - scripts/vehicle/**
      - sources/**
      - tests/vehicle/**
      - static/vehicle/su7*.glb
      - package.json

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate SU7 assets
        run: npm run vehicle:generate

      - name: Inspect SU7 assets
        run: npm run vehicle:inspect

      - name: Verify generated assets are committed
        run: git diff --exit-code -- static/vehicle/su7.glb static/vehicle/su7-compressed.glb

      - name: Run vehicle tests
        run: npm run test:vehicle

      - name: Build production bundle
        run: npm run build
